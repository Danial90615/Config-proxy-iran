name: Deploy Nova Proxy to Cloudflare

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Inject D1 database id
        run: |
          sed -i "s/placeholder-cloudflare-will-replace-this/${{ secrets.CLOUDFLARE_D1_ID }}/" wrangler.jsonc
          cat wrangler.jsonc

      - name: Deploy with Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
